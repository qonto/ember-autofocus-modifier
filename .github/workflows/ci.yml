name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request: {}

concurrency:
  group: ci-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: "Tests"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install pnpm
        uses: wyvox/action-setup-pnpm@v3
        with:
          node-version: 22.x
          args: "--frozen-lockfile"
      - name: Lint
        run: pnpm lint
      - name: Run tests
        run: pnpm test

  floating:
    name: "Floating Dependencies"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install pnpm
        uses: wyvox/action-setup-pnpm@v3
        with:
          node-version: 22.x
          args: "--no-lockfile"
      - name: Run tests
        run: pnpm test

  try-scenarios:
    name: "ember-try: ${{ matrix.ember-try-scenario }}"
    runs-on: ubuntu-latest
    needs: "test"

    strategy:
      fail-fast: false
      matrix:
        ember-try-scenario:
          - ember-lts-5.12
          - ember-lts-6.8
          - ember-lts-6.12
          - ember-release
          - ember-beta
          - ember-canary
          - embroider-safe
          - embroider-optimized
        # embroider-safe/embroider-optimized are known-broken upstream: @embroider/compat v4
        # dropped webpack support from compatBuild() (now hard-coded to a vite `buildOnce` hook),
        # but @embroider/test-setup is stuck at v4.0.0 (peer dep `@embroider/compat: ^3.4.8`) and
        # still passes the old-style `Webpack` packager class, which is now invoked as a plain
        # function -> "TypeError: Class constructor Webpack cannot be invoked without 'new'".
        # Tracked upstream: https://github.com/embroider-build/embroider/issues/2699
        # (WIP fix: https://github.com/embroider-build/embroider/pull/2729, unmerged as of writing).
        # There is no released `@embroider/test-setup` compatible with `@embroider/compat` v4 yet,
        # so these two scenarios cannot pass until upstream ships a fix. Allow them to fail without
        # blocking CI, rather than hiding or removing the scenarios.
        include:
          - ember-try-scenario: embroider-safe
            allow-failure: true
          - ember-try-scenario: embroider-optimized
            allow-failure: true

    continue-on-error: ${{ matrix.allow-failure == true }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install pnpm
        uses: wyvox/action-setup-pnpm@v3
        with:
          node-version: 22.x
          args: "--frozen-lockfile"
      - name: Run tests
        run: pnpm ember try:one ${{ matrix.ember-try-scenario }} --skip-cleanup
        working-directory: test-app

  typescript-compatibility:
    name: Type checking - ${{ matrix.typescript-scenario }}
    runs-on: ubuntu-latest

    needs: [test]

    strategy:
      fail-fast: false
      matrix:
        typescript-scenario:
          - typescript@6.0
          - typescript@next

    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install pnpm
        uses: wyvox/action-setup-pnpm@v3
        with:
          node-version: 22.x
          args: "--frozen-lockfile"
      - name: Update TS version on addon package
        run: pnpm add -D ${{ matrix.typescript-scenario }}
        working-directory: ember-autofocus-modifier
      - name: Update TS version on test-app package
        run: pnpm add -D ${{ matrix.typescript-scenario }}
        working-directory: test-app
      - name: Type checking
        run: pnpm lint:types
